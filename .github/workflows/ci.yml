name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Install latest TypeScript
        run: npm install typescript@latest --save-dev

      - name: Verify dist matches src
        run: |
          npx tsc -p packages/rag-core/tsconfig.json
          npx tsc -p packages/plugin/tsconfig.json
          git diff --exit-code packages/rag-core/dist/ packages/plugin/dist/ || (
            echo "dist/ is out of date. Run 'npx tsc' in each package and commit the results." && exit 1
          )

      - name: Lint TypeScript
        run: |
          npx tsc --noEmit -p packages/rag-core/tsconfig.json
          npx tsc --noEmit -p packages/plugin/tsconfig.json