name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 22]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm install

      - name: Install TypeScript
        run: npm install typescript@latest --save-dev --ignore-scripts

      - name: Verify dist matches src
        run: |
          npx tsc -p packages/rag-core/tsconfig.json
          npx tsc -p packages/plugin/tsconfig.json
          if ! git diff --exit-code packages/rag-core/dist/ packages/plugin/dist/; then
            echo "::error::dist/ is out of date. Run npx tsc in each package and commit the results."
            exit 1
          fi

      - name: Type check
        run: |
          npx tsc --noEmit -p packages/rag-core/tsconfig.json
          npx tsc --noEmit -p packages/plugin/tsconfig.json
